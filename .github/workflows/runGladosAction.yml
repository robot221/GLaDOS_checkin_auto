name: 每日签到

on:
  workflow_dispatch:
  schedule:
    - cron: '30 1 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 删除 uses: actions/checkout，改用 git 命令拉取（如果不需要代码仓库内容，甚至可以删掉这一步）
      - name: Checkout
        run: |
          git init
          git remote add origin https://github.com/${{ github.repository }}
          git fetch
          git checkout main
      
      - name: Run checkin
        run: |
          python -m pip install requests
          python3 glados.py
        env:
          GLADOS_COOKIE: ${{ secrets.GLADOS_COOKIE }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
